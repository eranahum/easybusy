name: Deploy to Hostinger

on:
  push:
    branches: [ "main" ]   # change if your default branch is different
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # If you have a build step (e.g., Vite/React), uncomment and adjust:
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      # - name: Install deps & build
      #   run: |
      #     npm ci
      #     npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.PORT }} -T 10 ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          # If you build, change RSYNC_SRC to your output folder (e.g., "dist/")
          RSYNC_SRC="./"
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.PORT }}" \
            "$RSYNC_SRC" "${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET }}"
