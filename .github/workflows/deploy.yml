name: Deploy to Hosting Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy via SCP
      uses: appleboy/scp-action@v0.1.4
      with:
        host: 82.29.189.137
        port: 65002
        username: u681736859
        password: ${{ secrets.SSH_PASSWORD }}
        source: "index.html,styles.css,app.js,privacy-policy.html,profile.jpg"
        target: "/public_html"
        strip_components: 0
        overwrite: true
        
    - name: Set file permissions
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: 82.29.189.137
        port: 65002
        username: u681736859
        password: ${{ secrets.SSH_PASSWORD }}
        script: |
          cd /public_html
          chmod 644 *.html *.css *.js *.jpg *.png
          echo "Deployment completed successfully!"
          echo "Files deployed:"
          ls -la *.html *.css *.js 