- name: Show target contents
  run: |
    ssh -o IdentitiesOnly=yes -p ${{ secrets.PORT }} -i ~/.ssh/id_ed25519 \
      ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
      "echo TARGET=${{ secrets.TARGET }}; ls -la ${{ secrets.TARGET }} | sed -n '1,120p'"

- name: Rsync dry-run (see what would change)
  run: |
    set -euxo pipefail
    RSYNC_SRC="./"   # change to dist/ or build/ if you use a build step
    rsync -avzn --delete \
      --exclude ".git" --exclude ".github" \
      -e "ssh -o IdentitiesOnly=yes -p ${{ secrets.PORT }} -i ~/.ssh/id_ed25519" \
      "$RSYNC_SRC" "${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET }}"

name: Deploy to Hostinger

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # If you use a build tool (Vite/React/etc.), uncomment and adjust:
      # - uses: actions/setup-node@v4
      #   with: { node-version: "20" }
      # - run: npm ci && npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.PORT }} -T 10 ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o IdentitiesOnly=yes -p ${{ secrets.PORT }} -i ~/.ssh/id_ed25519 \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} "echo CONNECTED"

      - name: Deploy via rsync
        run: |
          RSYNC_SRC="./"   # change to your build folder (e.g., dist/ or build/) if you build
          rsync -az --delete \
            --exclude ".git" --exclude ".github" \
            -e "ssh -o IdentitiesOnly=yes -p ${{ secrets.PORT }} -i ~/.ssh/id_ed25519" \
            "$RSYNC_SRC" "${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET }}"
