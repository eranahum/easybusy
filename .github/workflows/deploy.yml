name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.PORT }} -T 10 ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o IdentitiesOnly=yes -vvv \
            -p ${{ secrets.PORT }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            "echo CONNECTED"
